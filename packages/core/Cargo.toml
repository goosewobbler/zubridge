[package]
name = "zubridge-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Platform-agnostic state management core for Zubridge"
authors = ["Sam Maister <goosewobbler@protonmail.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/goosewobbler/zubridge"
homepage = "https://github.com/goosewobbler/zubridge/tree/main/packages/core"
readme = "README.md"
keywords = ["zubridge", "state-management", "tauri", "electron", "uniffi"]
categories = ["gui", "api-bindings"]

[lib]
crate-type = ["rlib"]

[features]
default = []
uniffi = ["dep:uniffi"]
napi = ["dep:napi", "dep:napi-derive"]
tauri = ["dep:tauri"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
log = "0.4"

# Optional: uniffi feature
uniffi = { version = "0.28", optional = true }

# Optional: napi feature
napi = { version = "2", optional = true, features = ["napi4"] }
napi-derive = { version = "2", optional = true }

# Optional: tauri feature
tauri = { workspace = true, optional = true }

# UUID generation is unconditional — P2 unifies on UUIDv4 for cross-platform action IDs.
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
serde_json = "1.0"
proptest = "1"
